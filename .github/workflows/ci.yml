name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile
        run: python -m py_compile llmval/*.py
      - name: Unit tests (stdlib-only, offline — no judge/embeddings)
        run: python -m unittest discover -s tests -v
      - name: Smoke-run the example suite offline
        run: python -m llmval run examples/example_suite.json --no-judge
